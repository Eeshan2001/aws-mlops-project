<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Topic Modeling App</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h2 class="text-center mb-4">

                Topic Modeling using LDA

            </h2>

            <form method="POST">

                <div class="mb-3">

                    <textarea
                        class="form-control"
                        rows="8"
                        name="text"
                        placeholder="Paste any article here..."
                        required></textarea>

                </div>

                <div class="text-center">

                    <button
                        class="btn btn-primary btn-lg"
                        type="submit">

                        Predict Topic

                    </button>

                </div>

            </form>

            {% if prediction %}

                <hr>

                <div class="alert alert-success">

                    <h4>

                        Prediction

                    </h4>

                    <h2>

                        {{ prediction }}

                    </h2>

                    <p>

                        Confidence:

                        {{ confidence }}

                    </p>

                </div>

                {% endif %}

                {% if error %}

                <div class="alert alert-danger">

                {{ error }}

                </div>

                {% endif %}

        </div>

    </div>

</div>

</body>

</html>
